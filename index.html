<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Manager | SAI Roots</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-searchbox.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-language_tools.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <div id="loadingText" class="text-white font-medium text-lg">Memproses...</div>
    </div>

    <div id="loginScreen" class="screen flex justify-center items-center">
        <div class="flex flex-col items-center">
            <i class="fab fa-github text-6xl text-white mb-6"></i>
            <h1 class="text-2xl font-light text-white tracking-tight mb-6">Sign in to GitHub Manager</h1>
            <div class="bg-card border-gh p-6 rounded-lg w-full max-w-sm shadow-2xl">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Personal Access Token</label>
                    <input type="password" id="ghToken" class="w-full" placeholder="ghp_xxxxxxxxxxxxxxxxx">
                </div>
                <button onclick="login()" class="btn btn-primary w-full py-2">Sign in</button>
            </div>
            <p class="mt-8 text-xs text-muted max-w-[250px] text-center">
                Gunakan token dengan akses <span class="font-mono text-gh">repo</span> dan <span class="font-mono text-gh">delete_repo</span>.
            </p>
        </div>
    </div>

    <div id="dashboardScreen" class="screen">
        <nav>
            <div class="flex items-center gap-3">
                <i class="fab fa-github text-2xl text-white"></i>
                <span class="text-white font-bold text-lg tracking-wide">GitHub Manager</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-black border-gh px-3 py-1 rounded-full">
                    <img id="userAvatar" src="" class="w-5 h-5 rounded-full border border-gh">
                    <span id="userName" class="text-sm font-medium"></span>
                </div>
                <button onclick="logout()" class="text-muted hover:text-white transition text-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <main class="flex-grow p-6 max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl text-white font-semibold">Repositories</h2>
                <button onclick="createRepo()" class="btn btn-primary">
                    <i class="fas fa-plus"></i> New Repository
                </button>
            </div>
            <div class="bg-card border-gh rounded-lg overflow-hidden shadow-sm">
                <div id="repoList">
                    </div>
            </div>
        </main>
    </div>

    <div id="explorerScreen" class="screen">
        <nav>
            <div class="flex items-center gap-4">
                <button onclick="showScreen('dashboardScreen')" class="text-muted hover:text-white">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="flex flex-col">
                    <span id="repoTitle" class="text-blue font-bold text-sm"></span>
                    <div class="flex items-center gap-2 mt-1">
                        <i class="fas fa-code-branch text-xs text-muted"></i>
                        <select id="branchSelector" onchange="changeBranch(this.value)" class="bg-transparent border-none text-xs text-muted p-0 cursor-pointer focus:ring-0">
                            </select>
                    </div>
                </div>
            </div>
            <div class="hidden sm:block text-xs text-muted italic">
                SAI Roots Music Project Management
            </div>
        </nav>

        <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
            <div class="flex flex-wrap gap-2 mb-6 bg-card p-4 rounded-lg border-gh items-center justify-between">
                <div class="flex flex-wrap gap-2">
                    <button onclick="openCreateModal('file')" class="btn btn-outline py-1.5 px-3">
                        <i class="fas fa-file-plus"></i> New File
                    </button>
                    <button onclick="openCreateModal('folder')" class="btn btn-outline py-1.5 px-3">
                        <i class="fas fa-folder-plus"></i> New Folder
                    </button>
                    <label class="btn btn-outline py-1.5 px-3 cursor-pointer">
                        <i class="fas fa-upload"></i> Files
                        <input type="file" id="fileUpload" multiple class="hidden" onchange="handleUpload(event, false)">
                    </label>
                    <label class="btn btn-outline py-1.5 px-3 cursor-pointer">
                        <i class="fas fa-folder-upload"></i> Folder
                        <input type="file" id="folderUpload" webkitdirectory directory multiple class="hidden" onchange="handleUpload(event, true)">
                    </label>
                </div>
                <button onclick="deleteSelected()" class="btn btn-danger py-1.5 px-3">
                    <i class="fas fa-trash-sweep"></i> Delete Selected
                </button>
            </div>

            <div id="breadcrumb" class="breadcrumb p-2 bg-card rounded border-gh border-dashed mb-4"></div>

            <div class="bg-card border-gh rounded-lg overflow-hidden shadow-xl">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="w-10 text-center">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" class="accent-blue">
                            </th>
                            <th>Name</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fileListBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="editorModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editorModalTitle" class="text-white font-semibold">Edit File</h3>
                <div class="flex gap-4 items-center">
                    <button onclick="toggleFullScreen()" class="text-muted hover:text-white" title="Toggle Full Screen">
                        <i class="fas fa-expand-arrows-alt"></i>
                    </button>
                    <button onclick="closeEditor()" class="text-muted hover:text-red-500">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div class="p-4 flex-grow flex flex-col gap-4 overflow-hidden">
                <div class="flex gap-2">
                    <input type="text" id="editorFileName" class="flex-grow font-mono text-sm" placeholder="path/to/file.html">
                </div>
                <div class="editor-container">
                    <div id="editor" style="height: 100%; width: 100%;"></div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="commitMsg" class="flex-grow text-sm" placeholder="Pesan commit (wajib)...">
                    <button onclick="commitFile()" class="btn btn-primary px-8">
                        Commit Changes
                    </button>
                </div>
                <p class="text-[10px] text-muted italic">
                    Tip: Gunakan <b>Ctrl + F</b> untuk Find & Replace. Tekan <b>Esc</b> untuk keluar mode Full Screen.
                </p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
